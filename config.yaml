project:
  name: starlink_port_probe
  output_root: /home/ubuntu/hzf/starlink_port_probe/runs
  port_list_file: /home/ubuntu/hzf/starlink_port_probe/nmap_top1000_tcp_ports.txt
  default_input_glob: /home/ubuntu/hzf/starlink_as_probe/as*/results/active_ipv4_*.csv

scan:
  engine: nmap
  nmap_path: /usr/bin/nmap
  scan_type: syn
  timing_template: -T4
  max_retries: 2
  host_timeout: 15m
  min_rate: 1000
  targets_per_chunk: 5000

fingerprint:
  workers: 4
  hosts_per_batch: 64
  nmap_path: /usr/bin/nmap
  timing_template: -T4
  version_intensity: 7
  host_timeout: 15m
  script_timeout: 2m
  min_hostgroup: 16
  max_hostgroup: 64

enrich:
  nvd_api_base: https://services.nvd.nist.gov/rest/json/cves/2.0
  request_timeout_seconds: 20
  max_cves_per_match: 20
  include_rejected: false
  query_delay_seconds: 0.6
  workers: 4
  rate_limit_qps: 1.6
  allow_keyword_fallback: false

report:
  top_n_products: 20
  top_n_cves: 20
