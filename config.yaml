project:
  name: starlink_port_probe
  output_root: /home/ubuntu/hzf/starlink_port_probe/runs
  default_port_profile: top1000
  port_profiles:
    top1000: /home/ubuntu/hzf/starlink_port_probe/nmap_top1000_tcp_ports.txt
    full: /home/ubuntu/hzf/starlink_port_probe/all_tcp_ports.txt
  default_input_glob: /home/ubuntu/hzf/starlink_as_probe/as*/results/active_ipv4_*.csv

scan:
  engine: xmap
  xmap_path: /usr/local/sbin/xmap
  probe_module: tcp_syn
  bandwidth: 10M
  cooldown_secs: 10
  batch: 1
  probes: 3
  retries: 1
  sender_threads: 4
  quiet: true

fingerprint:
  workers: 4
  hosts_per_batch: 512
  os_detection: true
  os_hosts_per_batch: 256
  os_max_tries: 1
  nmap_path: /usr/bin/nmap
  timing_template: -T4
  version_intensity: 3
  host_timeout: 15m
  script_timeout: 2m
  min_hostgroup: 64
  max_hostgroup: 256

enrich:
  nvd_api_base: https://services.nvd.nist.gov/rest/json/cves/2.0
  request_timeout_seconds: 20
  max_cves_per_match: 20
  include_rejected: false
  query_delay_seconds: 0.6
  workers: 4
  rate_limit_qps: 1.6
  allow_keyword_fallback: false

report:
  top_n_products: 20
  top_n_cves: 20
